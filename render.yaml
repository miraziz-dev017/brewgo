services:
  - type: web
    name: brewgo-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
